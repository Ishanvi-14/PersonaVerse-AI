version: 1.0
runtime: nodejs20
build:
  commands:
    pre-build:
      - npm --version
      - node --version
    build:
      - echo "Building frontend..."
      - cd frontend && npm ci && npm run build
      - echo "Installing backend dependencies and building..."
      - cd ../backend && npm ci && npm run build
    post-build:
      - echo "Build complete"
run:
  runtime-version: 20
  command: node dist/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "8080"
    - name: AWS_REGION
      value: "ap-south-1"
    - name: S3_BUCKET_NAME
      value: "aib-3-bucket"
    - name: DYNAMODB_TABLE_HISTORY
      value: "personaverse-user-history"
    - name: DYNAMODB_TABLE_PERSONAS
      value: "personaverse-personas"
    - name: DYNAMODB_TABLE_USERS
      value: "personaverse-users"
    - name: DYNAMODB_TABLE_CALENDAR
      value: "personaverse-calendar"
    - name: JWT_SECRET
      value: "personaverse-secret-key-prod-2026"
    - name: USE_GROQ
      value: "true"
    - name: ENABLE_VOICE_TO_TEXT
      value: "true"
    - name: ENABLE_MULTILINGUAL
      value: "true"
    - name: ENABLE_HISTORY_STORAGE
      value: "true"
