version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - echo "Installing frontend dependencies..."
      - cd frontend && npm ci
      - cd /app
      - echo "Installing backend dependencies..."
      - cd backend && npm ci
      - cd /app
    build:
      - echo "Building frontend..."
      - cd frontend && npm run build
      - cd /app
      - echo "Building backend..."
      - cd backend && npm run build
      - cd /app
    post-build:
      - echo "Build complete"
      - ls -la backend/dist
run:
  command: node backend/dist/server.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "8080"
    - name: AWS_REGION
      value: "ap-south-1"
    - name: AWS_ACCESS_KEY_ID
      value: "AKIA27CKQTL32J6VKTUI"
    - name: AWS_SECRET_ACCESS_KEY
      value: "FSc5sXEczySXnCcdfaCqOWIpap/CS0GJlzwR7QU8kKqDykQ1tXMDUFmlUN7PmbTaE9pu3jsnYhRAoNxf"
    - name: S3_BUCKET_NAME
      value: "aib-3-bucket"
    - name: DYNAMODB_TABLE_HISTORY
      value: "personaverse-user-history"
    - name: DYNAMODB_TABLE_PERSONAS
      value: "personaverse-personas"
    - name: DYNAMODB_TABLE_USERS
      value: "personaverse-users"
    - name: DYNAMODB_TABLE_CALENDAR
      value: "personaverse-calendar"
    - name: JWT_SECRET
      value: "de45a6458abdf743135ac890fecfc9e00278703643dc169098aca4b1d90ccbb3b5f816ef06e4bffae2b3cee35d6236f02a3aad368f963b737345d6f1fdad03e1"
    - name: USE_GROQ
      value: "true"
    - name: ENABLE_VOICE_TO_TEXT
      value: "true"
    - name: ENABLE_MULTILINGUAL
      value: "true"
    - name: ENABLE_HISTORY_STORAGE
