version: 1.0
runtime: nodejs20
build:
  commands:
    pre-build:
      - npm --version
      - node --version
    build:
      - echo "Building frontend..."
      - cd frontend && npm ci && npm run build
      - echo "Installing backend dependencies and building..."
      - cd ../backend && npm ci && npm run build
    post-build:
      - echo "Build complete"
run:
  runtime-version: 20
  command: node dist/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: "production"
