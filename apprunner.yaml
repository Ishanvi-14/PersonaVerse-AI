version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - echo "Installing frontend dependencies..."
      - cd /app/frontend && npm ci
      - echo "Installing backend dependencies..."
      - cd /app/backend && npm ci
    build:
      - echo "Building frontend..."
      - cd /app/frontend && npm run build
      - echo "Copying frontend build to backend public directory..."
      - mkdir -p /app/backend/public
      - cp -r /app/frontend/dist/* /app/backend/public/
      - echo "Building backend..."
      - cd /app/backend && npm run build
    post-build:
      - echo "Build complete - verifying file locations..."
      - echo "Backend dist contents:"
      - ls -la /app/backend/dist
      - echo "Backend public directory:"
      - ls -la /app/backend/public || echo "No /app/backend/public directory"
      - echo "Root public directory:"
      - ls -la /app/public || echo "No /app/public directory"
      - echo "Checking for index.html:"
      - find /app -name "index.html" -type f 2>/dev/null || echo "No index.html found"
run:
  command: node /app/backend/dist/server.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "8080"
    - name: USE_MOCK_AUTH
      value: "true"
    - name: AWS_REGION
      value: "ap-south-1"
    - name: AWS_ACCESS_KEY_ID
      value: "AKIA27CKQTL32J6VKTUI"
    - name: AWS_SECRET_ACCESS_KEY
      value: "FSc5sXEczySXnCcdfaCqOWIpap/CS0GJlzwR7QU8kKqDykQ1tXMDUFmlUN7PmbTaE9pu3jsnYhRAoNxf"
    - name: S3_BUCKET_NAME
      value: "aib-3-bucket"
    - name: DYNAMODB_TABLE_HISTORY
      value: "personaverse-user-history"
    - name: DYNAMODB_TABLE_PERSONAS
      value: "personaverse-personas"
    - name: DYNAMODB_TABLE_USERS
      value: "personaverse-users"
    - name: DYNAMODB_TABLE_CALENDAR
      value: "personaverse-calendar"
    - name: JWT_SECRET
      value: "de45a6458abdf743135ac890fecfc9e00278703643dc169098aca4b1d90ccbb3b5f816ef06e4bffae2b3cee35d6236f02a3aad368f963b737345d6f1fdad03e1"
    - name: USE_GROQ
